spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xiaoxinshu
    username: root
    password: 123456
  # Redis 配置
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      timeout: 5000
      password: 123456
  # elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: 123456
mybatis-plus:
  configuration:
    # 生产环境关闭日志
    log-impl: ''
# 接口文档配置
springdoc:
  api-docs:
    enabled: false
sa-token:
  token-name: tokenprod
  is-log: false
# 策略模式
storage:
  # 文件上传
  file:
    type: minio # 对象存储类型
minio:
  endpoint: http://localhost:9000
  accessKey: root
  secretKey: 123456
  bucketName: xiaoxinshu
cos:
  secretId: xx
  secretKey: xx
  region: xx
  bucket: xx